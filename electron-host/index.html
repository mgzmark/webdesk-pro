<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebDesk Host</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #09090b;
      color: #f4f4f5;
      padding: 24px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      margin-top: 0;
      color: #e4e4e7;
      font-weight: 500;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      padding: 24px;
      border-radius: 12px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 20px;
      text-align: center;
    }
    .label {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 8px;
    }
    .value {
      font-size: 32px;
      color: #34d399;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 2px;
      margin-bottom: 24px;
      font-weight: bold;
    }
    .value:last-child {
      margin-bottom: 0;
    }
    .status-container {
      margin-top: 30px;
      padding: 12px 24px;
      border-radius: 9999px;
      background: #27272a;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fbbf24;
    }
    .status-dot.connected {
      background: #34d399;
    }
    .status-dot.error {
      background: #f87171;
    }
  </style>
</head>
<body>
  <h2>WebDesk Pro Host</h2>
  
  <div class="card">
    <div class="label">Your Device ID</div>
    <div class="value" id="local-id">Loading...</div>
    
    <div class="label">Connection Password</div>
    <div class="value" id="local-pass">------</div>
  </div>

  <div class="status-container">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting to server...</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
